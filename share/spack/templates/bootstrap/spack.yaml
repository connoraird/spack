# This environment contains Spack non-core dependencies for the
# following configuration
#
# Python spec: {{ python_spec }}
# Python interpreter: {{ python_prefix }}
# Architecture: {{ architecture }}
#
spack:
  specs:
{% for spec in environment_specs %}
    - "{{ spec }}"
{% endfor %}
  view: {{ environment_path }}/view

  config:
    install_tree:
      root: {{ store_path }}
      padded_length: 0

    install_status: false

  packages:
    python:
      buildable: false
      externals:
        - spec: "{{ python_spec }}"
          prefix: "{{ python_prefix }}"

    py-typed-ast:
      require: "+wheel"

    py-platformdirs:
      require: "+wheel"

  concretizer:
    reuse: true
    unify: true
    targets:
      granularity: generic
      host_compatible: false

  mirrors::
{% for mirror in bootstrap_mirrors %}
    {{mirror}}:
      url: https://binaries.spack.io/releases/v2026.03/{{mirror}}
      signed: true
{% endfor %}
